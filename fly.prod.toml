# Production config. Deployed automatically by .github/workflows/prod-deploy.yml
# on every push to main. One-time setup before the first deploy:
#
#   flyctl apps create vitalscope
#   flyctl volumes create vitalscope_data --region fra --size 1 --app vitalscope
#   flyctl secrets set GARMIN_EMAIL=... GARMIN_PASSWORD=... \
#                      STRONG_EMAIL=...  STRONG_PASSWORD=...  \
#                      EUFY_EMAIL=...    EUFY_PASSWORD=...    \
#                      ANTHROPIC_API_KEY=sk-ant-...            \
#                      VITALSCOPE_SESSION_SECRET=$(openssl rand -base64 32) \
#                      --app vitalscope
#
# VITALSCOPE_SESSION_SECRET signs the auth cookie. Set it once in prod so
# the cookie stays valid across restarts/deploys; without it the backend
# falls back to a per-process random value and users get logged out on
# every deploy. Rotate it to force a global sign-out.
#
# AI analyser provider is selected by VITALSCOPE_AI_PROVIDER (default
# "anthropic"). Set the matching API key for whichever provider you pick:
#
#   anthropic  → ANTHROPIC_API_KEY       (default model claude-sonnet-4-6)
#   openai     → OPENAI_API_KEY          (default model gpt-4o)
#   openrouter → OPENROUTER_API_KEY      (default model anthropic/claude-sonnet-4.6)
#
# Optional overrides (apply to whichever provider is active):
#   VITALSCOPE_AI_MODEL       overrides the per-provider default
#   VITALSCOPE_AI_TIMEOUT_SEC default 20
#
# Unlike preview deploys, prod keeps one machine always running so the
# APScheduler-based plugins can fire on their intervals. Volume is mounted
# at /data so the SQLite DB and uploads survive redeploys.

app = "vitalscope"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  VITALSCOPE_ENV = "prod"
  VITALSCOPE_DEMO = "0"
  VITALSCOPE_DB = "/data/vitalscope.db"
  VITALSCOPE_UPLOADS = "/data/uploads"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1024mb"

[[mounts]]
  source = "vitalscope_data"
  destination = "/data"
