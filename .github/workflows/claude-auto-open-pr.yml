name: Claude Auto-Open PR

on:
  push:
    branches:
      - 'claude/issue-*'

jobs:
  open-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Open PR if none exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          existing=$(gh pr list --repo "$REPO" --head "$BRANCH" --state open --json number --jq 'length')
          if [ "$existing" != "0" ]; then
            echo "PR already open for $BRANCH — nothing to do."
            exit 0
          fi

          issue=$(printf '%s' "$BRANCH" | sed -n 's|^claude/issue-\([0-9]\+\).*|\1|p')
          title=$(git log -1 --pretty=%s)

          if [ -n "$issue" ]; then
            body=$(printf 'Closes #%s\n\nAutomatically opened by `.github/workflows/claude-auto-open-pr.yml` after Claude pushed to `%s`.\n' "$issue" "$BRANCH")
          else
            body=$(printf 'Automatically opened by `.github/workflows/claude-auto-open-pr.yml` after Claude pushed to `%s`.\n' "$BRANCH")
          fi

          gh pr create --repo "$REPO" \
            --head "$BRANCH" \
            --base main \
            --title "$title" \
            --body "$body"
