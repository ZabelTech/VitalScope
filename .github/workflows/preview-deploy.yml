name: Preview deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  require-e2e-for-feature:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require E2E coverage for feature changes
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: bash scripts/require_e2e_for_feature.sh

  frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Type-check frontend
        run: |
          cd frontend
          npm ci
          npx tsc --noEmit

  e2e-usecases:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install backend dependencies
        run: pip install -r requirements.txt
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      - name: Install Playwright Chromium + system deps
        run: |
          cd frontend
          npx playwright install --with-deps chromium
      - name: Run E2E use-case suite
        run: |
          cd frontend
          npm run test:e2e

  deploy:
    runs-on: ubuntu-latest
    needs: [require-e2e-for-feature, frontend-typecheck, e2e-usecases]
    permissions:
      pull-requests: write
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      APP_NAME: vitalscope-pr-${{ github.event.number }}
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create app if missing
        run: |
          if ! flyctl apps list --json | jq -e ".[] | select(.Name==\"$APP_NAME\")" > /dev/null; then
            flyctl apps create "$APP_NAME" --org personal
          fi

      - name: Deploy
        run: |
          flyctl deploy \
            --app "$APP_NAME" \
            --config fly.toml \
            --remote-only \
            --yes \
            --env VITALSCOPE_SHA=${{ github.event.pull_request.head.sha }}

      - name: Upsert preview URL comment
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: https://vitalscope-pr-${{ github.event.number }}.fly.dev
        with:
          script: |
            const marker = '<!-- vitalscope-preview-url -->';
            const body = `${marker}\n**Preview**: ${process.env.PREVIEW_URL}\n\nDemo mode — synthetic data, resets on every deploy.`;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }
