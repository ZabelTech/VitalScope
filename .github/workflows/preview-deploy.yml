name: Preview deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      APP_NAME: vitalscope-pr-${{ github.event.number }}
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create app if missing
        run: |
          if ! flyctl apps list --json | jq -e ".[] | select(.Name==\"$APP_NAME\")" > /dev/null; then
            flyctl apps create "$APP_NAME" --org personal
          fi

      - name: Deploy
        run: |
          flyctl deploy \
            --app "$APP_NAME" \
            --config fly.toml \
            --remote-only \
            --yes \
            --env VITALSCOPE_SHA=${{ github.event.pull_request.head.sha }}

      - name: Upsert preview URL comment
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: https://vitalscope-pr-${{ github.event.number }}.fly.dev
        with:
          script: |
            const marker = '<!-- vitalscope-preview-url -->';
            const body = `${marker}\n**Preview**: ${process.env.PREVIEW_URL}\n\nDemo mode — synthetic data, resets on every deploy.`;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }
