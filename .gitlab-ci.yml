stages:
  - guard
  - test

require_e2e_for_feature:
  stage: guard
  image: alpine:3.21
  before_script:
    - apk add --no-cache bash git ripgrep
  script:
    - bash scripts/require_e2e_for_feature.sh
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

frontend_typecheck:
  stage: test
  image: node:24-bookworm
  script:
    - cd frontend
    - npm ci
    - npx tsc --noEmit
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_BRANCH'

e2e_usecases:
  stage: test
  image: mcr.microsoft.com/playwright:v1.56.1-noble
  variables:
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
  before_script:
    - python3 -m venv .venv
    - . .venv/bin/activate
    - pip install -r requirements.txt
  script:
    - cd frontend
    - npm ci
    - npm run test:e2e
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_BRANCH'
